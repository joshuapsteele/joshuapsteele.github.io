baseURL: https://joshuapsteele.com
publishDir: public
languageCode: en-US
title: Joshua P. Steele
theme: PaperMod
timeZone: America/New_York
disqusShortname: joshuapsteele
enableRobotsTXT: true
enableGitInfo: true
pagination:
  pagerSize: 15
  path: "page"
taxonomies:
  category: categories
  tag: tags
params:
  description: Joshua P. Steele's home on the web
  env: production
  defaultTheme: auto
  mainSections:
  - blog
  disableThemeToggle: false
  label:
    text: Joshua P. Steele
    icon: /images/JPS-hex-logo-white.png
    iconHeight: 35
  showShareButtons: true
  showReadingTime: true
  showToc: true
  showBreadCrumbs: true
  
  # Social and Open Graph parameters
  images: ["/images/default-social.png"] # Default social sharing image
  defaultImage: "/images/default-social.png" # Fallback image for social sharing
  title: "Josh Thinks You Should See This" # Default title for social sharing
  author: "Joshua P. Steele" # Author name for social sharing
  showPostNavLinks: true
  showCodeCopyButtons: true
  showFullTextInRSS: true
  showFullTextInJSONFeed: true
  showAllPagesInArchive: false
  comments: false
  hideFooter: false
  assets:
    favicon: /favicon.ico
    disableHLJS: true
  editPost:
    URL: "https://github.com/joshuapsteele/joshuapsteele.github.io/tree/main/content"
    Text: "View Source Code on GitHub" # edit text
    appendFilePath: true # to append file path to Edit link
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    # limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
  profileMode:
    enabled: true
    title: "Joshua P. Steele"
    subtitle: "I solve problems with a heart for people and an eye for detail."
    imageUrl: "/images/headshot.jpg" # optional
    imageTitle: "Joshua P. Steele" # optional
    imageWidth: 160 # custom size
    imageHeight: 160 # custom size
    buttons:
      # Primary buttons (always visible)
      - name: About 👤
        url: "/about/"
      - name: Blog ✍️
        url: "/blog/"
      - name: Categories 🗂️
        url: "/categories/"
      - name: Tags 🏷️
        url: "/tags/"
      - name: Contact 📬
        url: "/contact/"
      - name: CV 📋
        url: "/cv/"
      - name: Links 🔗
        url: "https://links.joshuapsteele.com"
      - name: Notes 📝
        url: "/notes/"
      - name: Now ⏳
        url: "/now/"
      - name: Popular 🔥
        url: "/popular/"
      - name: Resources 📚
        url: "/resources/"
      - name: Search 🔎
        url: "/search/"
      - name: Uses 🧰
        url: "/uses/"
    moreButtons:
      # Secondary buttons (hidden by default)
      - name: Blogroll 📇
        url: "/blogroll/"
      - name: Bookmarks 📚
        url: "/bookmarks/"
      - name: Carry (EDC) 🎒
        url: "/carry/"
      - name: Chipotle 🌯
        url: "/chipotle/"
      - name: Defaults ⚙️
        url: "/defaults/"
      - name: Follow 👣
        url: "/follow/"
      - name: Ideas 💡
        url: "/ideas/"
      - name: Interests 🎨
        url: "/interests/"
      - name: Lists 🗒️
        url: "/lists/"
      - name: Nope 🚫
        url: "/nope/"
      - name: Pages 📄
        url: "/slashes/"
      - name: POSSE 🌐
        url: "/posse/"
      - name: Questions 🤨
        url: "/questions/"
      - name: Resist ✊
        url: "/resist/"
      - name: Save 💾
        url: "/save/"
      - name: Someday 🗓️
        url: "/someday/"
      - name: TIL 🆕
        url: "/til/"
      - name: Why ❓
        url: "/why/"
      - name: Wish List 🎁
        url: "/wish-list/"
      - name: Yep ✅
        url: "/yep/"
  socialIcons: # optional
    # BlueSky account deleted - March 2026
    # - name: BlueSky
    #   url: "https://bsky.app/profile/joshuapsteele.bsky.social"
    - name: Mastodon
      url: "https://mastodon.social/@joshuapsteele"
    - name: threads
      url: "https://www.threads.com/@joshuapsteele"
    - name: GitHub
      url: "https://github.com/joshuapsteele/"
    - name: LinkedIn
      url: "https://www.linkedin.com/in/joshuapsteele/"
    - name: microblog
      url: "https://social.joshuapsteele.com"
    - name: rss
      url: "https://joshuapsteele.com/blog/feed.xml"
markup:
  highlight:
    codeFences: true
    guessSyntax: true
    style: monokai
  goldmark:
    renderer:
      unsafe: true
mediaTypes:
  application/feed+json:
    suffixes:
      - json
outputs:
  home:
    - HTML
    - RSS
    - JSON
  section:
    - HTML
    - RSS
    - JSONFeed
outputFormats:
  RSS:
    mediaType: application/rss+xml
    baseName: feed
  JSONfeed:
    mediaType: application/feed+json
    baseName: feed
    rel: alternate
    isPlainText: true
menu:
  main:
    - name: About
      url: /about/
      weight: 1
    - name: Notes
      url: /notes/
      weight: 2
    - name: Blog
      url: /blog/
      weight: 3
    - name: Contact
      url: /contact/
      weight: 4
    - name: Resources
      url: /resources/
      weight: 5
    - name: Search
      url: /search?
      weight: 6
# Performance optimizations
minify:
  tdewolff:
    html:
      keepWhitespace: false
    css:
      version: 3
      precision: 0
    js:
      keepVarNames: false
      precision: 0
    json:
      precision: 0
    svg:
      precision: 0
    xml:
      keepWhitespace: false

# Build performance
build:
  writeStats: true
  noJSConfigInAssets: false
  useResourceCacheWhen: "fallback"

# Caching configuration
caches:
  images:
    maxAge: "24h"
  assets:
    maxAge: "24h"
  modules:
    maxAge: "24h"

# Asset processing
imaging:
  resampleFilter: "CatmullRom"
  quality: 75
  anchor: "Smart"

