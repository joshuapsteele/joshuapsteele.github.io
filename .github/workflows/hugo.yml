# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.160.1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo
        run: |
          curl -L "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" -o /tmp/hugo.tar.gz
          mkdir -p /tmp/hugo
          tar -xzf /tmp/hugo.tar.gz -C /tmp/hugo hugo
          echo "/tmp/hugo" >> "$GITHUB_PATH"
          /tmp/hugo/hugo version

      - name: Fetch popular posts from Tinylytics
        env:
          TINYLYTICS_API_KEY: ${{ secrets.TINYLYTICS_API_KEY }}
        continue-on-error: true
        run: python3 scripts/fetch_popular_posts.py

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "https://joshuapsteele.com/"

      - name: Send outgoing Webmentions
        continue-on-error: true
        run: |
          python3 scripts/send_webmentions.py \
            --public-dir public \
            --feed public/notes/feed.json \
            --feed public/blog/feed.json \
            --limit 5 \
            --since-days 30

      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory "public" \
            -cf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
